<mat-card>
  <form [formGroup]="form" (ngSubmit)="add()">
    <mat-form-field appearance="outline" style="width:100%">
      <mat-label>Título</mat-label>
      <input matInput formControlName="title" required />
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="description" />
    </mat-form-field>

    <div style="display:flex; gap:8px; justify-content:flex-end">
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Agregar</button>
    </div>
  </form>
</mat-card>

<mat-card style="margin-top:12px">
  <mat-tab-group>
    <mat-tab label="Pendientes">
      <mat-list>
        <div *ngFor="let t of pendingTasks" style="display:flex; align-items:center; gap:8px; padding:8px 0;">
          <mat-checkbox [checked]="t.completed" (change)="toggle(t, $event)"></mat-checkbox>
          <div style="flex:1; margin-left:8px">
            <div>{{t.title}}</div>
            <div style="font-size:12px; color:gray">{{t.description}}</div>
          </div>
          <button mat-icon-button color="warn" (click)="remove(t)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </mat-list>
    </mat-tab>

    <mat-tab label="Completadas">
      <mat-list>
        <div *ngFor="let t of completedTasks" style="display:flex; align-items:center; gap:8px; padding:8px 0;">
          <mat-checkbox [checked]="t.completed" (change)="toggle(t, $event)"></mat-checkbox>
          <div style="flex:1; margin-left:8px">
            <div style="text-decoration: line-through">{{t.title}}</div>
            <div style="font-size:12px; color:gray">{{t.description}}</div>
          </div>
          <button mat-icon-button color="warn" (click)="remove(t)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </mat-list>
    </mat-tab>
  </mat-tab-group>
</mat-card>
